<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - AGS Technology | شركة الدقة للسلامة العامة</title>
  <meta name="description" content="تسجيل الدخول لعملاء شركة الدقة للسلامة العامة (AGS) وشركة المنار." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="author" content="Eng. Osama Mossa Al-Salhout" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      margin: 0;
      padding-top: 0 !important;
      font-family: 'Cairo', sans-serif;
      background: #fff;
    }

    .auth-wrapper {
      display: flex;
      min-height: 100vh;
      width: 100%;
    }

    .auth-illustration {
      flex: 1;
      background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-800) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    
    .auth-illustration::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
      top: -150px;
      right: -150px;
      border-radius: 50%;
    }

    .auth-illustration h2 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      z-index: 1;
    }

    .auth-illustration p {
      font-size: 1.1rem;
      opacity: 0.9;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
      z-index: 1;
    }

    .auth-form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #fdfdfd;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary-700);
      letter-spacing: -0.5px;
    }
    .login-logo svg {
      width: 36px;
      height: 36px;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: right;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 700;
      color: var(--dark-800);
      font-size: 0.95rem;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      right: 14px;
      color: var(--gray-500);
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: color 0.3s;
    }

    .form-control {
      width: 100%;
      padding: 0.9rem 1.2rem 0.9rem 2.5rem;
      padding-right: 2.5rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      transition: all 0.3s ease;
      box-sizing: border-box;
      background: #fff;
      font-size: 1rem;
      color: var(--dark-800);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary-500);
      box-shadow: 0 0 0 4px rgba(21,101,192,0.1);
    }
    .form-control:focus + .input-icon {
      color: var(--primary-600);
    }

    .password-toggle {
      position: absolute;
      left: 14px;
      color: var(--gray-500);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      padding: 0;
    }
    .password-toggle:hover {
      color: var(--primary-600);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-700) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(21,101,192,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(21,101,192,0.3);
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--gray-500);
      font-size: 0.9rem;
      font-weight: 700;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .divider:not(:empty)::before {
      margin-left: .5em;
    }
    .divider:not(:empty)::after {
      margin-right: .5em;
    }

    .btn-google {
      width: 100%;
      padding: 0.9rem;
      background: white;
      color: #3c4043;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }
    .btn-google:hover {
      background: #f8f9fa;
      border-color: rgba(0,0,0,0.15);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      display: none;
      text-align: right;
    }
    .alert-error {
      color: #d32f2f;
      background: #ffebee;
      border-right: 4px solid #d32f2f;
    }
    .alert-success {
      color: #00C853;
      background: #E8F5E9;
      border-right: 4px solid #00C853;
    }

    @media (max-width: 768px) {
      .auth-illustration {
        display: none;
      }
      .auth-form-side {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <!-- Illustration Side -->
    <div class="auth-illustration">
      <svg width="250" height="250" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1" style="margin-bottom:2rem; z-index:1;">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
      <h2>عودة حميدة!</h2>
      <p>قم بتسجيل الدخول لمتابعة طلباتك، وإدارة حسابك، واكتشاف أحدث المعدات المضافة إلى الكتالوج.</p>
    </div>

    <!-- Form Side -->
    <div class="auth-form-side">
      <div class="login-container">
        <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--gray-600); text-decoration: none; font-weight: 700; margin-bottom: 1.5rem; font-size: 1rem; transition: color 0.3s;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          الرجوع للرئيسية
        </a>

        <div class="login-logo" style="justify-content: center; margin-bottom: 2rem; margin-top: 1rem;">
          <a href="index.html" style="display: block;">
            <img src="logo.png?v=5" alt="AGS Technology Logo" style="max-height: 100px; max-width: 300px; width: auto; object-fit: contain; margin: 0 auto; display: block;">
          </a>
        </div>
        
        <h2 style="margin-top:0;margin-bottom:0.5rem;color:var(--dark-800);font-size:1.6rem;">تسجيل الدخول</h2>
        <p style="color:var(--gray-500);font-size:0.95rem;margin-bottom:2rem;">أدخل بيانات الاعتماد الخاصة بك للمتابعة</p>

        <div id="error-msg" class="alert alert-error"></div>
        <div id="success-msg" class="alert alert-success"></div>

        <form id="loginForm">
          
          <div class="form-group">
            <label>البريد الإلكتروني</label>
            <div class="input-wrapper">
              <input type="email" id="email" class="form-control" required placeholder="admin@example.com" dir="ltr">
              <div class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
            </div>
          </div>
          
          <div class="form-group">
            <label>كلمة المرور</label>
            <div class="input-wrapper">
              <input type="password" id="password" class="form-control" required placeholder="••••••••" dir="ltr">
              <div class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </div>
              <button type="button" class="password-toggle" tabindex="-1" onclick="togglePassword('password', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div style="text-align: left; margin-top: 8px;">
              <a href="forgot-password.html" style="color: var(--primary-600); font-size: 0.85rem; font-weight: 700; text-decoration: none;">نسيت كلمة المرور؟</a>
            </div>
          </div>
          
          <button type="submit" class="btn-login" id="loginBtn">
            <span id="btn-text">دخول</span>
            <div class="spinner" id="btn-spinner"></div>
          </button>
        </form>

        <div class="divider">أو</div>
        
        <button id="googleBtn" class="btn-google" type="button">
          <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          الدخول باستخدام جوجل
        </button>
        
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.95rem;">
          <span style="color: var(--gray-500);">ليس لديك حساب؟</span>
          <a href="register.html" style="color: var(--primary-600); font-weight: 700; text-decoration: none;">إنشاء حساب جديد</a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=6"></script>

<script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      
      if(isPass) {
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
      } else {
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');
      const err = document.getElementById('error-msg');
      const succ = document.getElementById('success-msg');

      btn.disabled = true;
      btnText.textContent = 'جاري التحقق...';
      spinner.style.display = 'block';
      err.style.display = 'none';

      const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
      });
      
      spinner.style.display = 'none';

      if (error) {
        err.style.display = 'block';
        err.textContent = 'بيانات الدخول غير صحيحة أو الحساب غير موجود';
        btn.disabled = false;
        btnText.textContent = 'دخول';
      } else {
        succ.style.display = 'block';
        succ.textContent = 'تم تسجيل الدخول بنجاح!';
        btnText.textContent = 'تم بنجاح';
        btn.style.background = '#00C853';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      }
    });

    document.getElementById('googleBtn').addEventListener('click', async () => {
      const err = document.getElementById('error-msg');
      err.style.display = 'none';
      
      const { data, error } = await window.supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/index.html'
        }
      });
      
      if (error) {
        err.style.display = 'block';
        err.textContent = 'حدث خطأ أثناء الاتصال بجوجل';
      }
    });

    // Check if already logged in
    window.addEventListener('DOMContentLoaded', async () => {
      if(!window.supabaseClient) return;
      const { data: { session } } = await window.supabaseClient.auth.getSession();
      if (session) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
